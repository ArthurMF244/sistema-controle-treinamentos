<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780"><rect width="100%" height="100%" fill="white"/><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker></defs><text x="600" y="35" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle" fill="#0f172a">Diagrama de Sequencia - Inscricao em Treinamento</text><rect x="250" y="80" width="700" height="45" rx="10" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/><text x="600.0" y="108" font-family="Arial" font-size="14" text-anchor="middle" fill="#0f172a">1. Colaborador solicita treinamentos disponiveis</text><line x1="600" y1="125" x2="600" y2="155" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="250" y="155" width="700" height="45" rx="10" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/><text x="600.0" y="183" font-family="Arial" font-size="14" text-anchor="middle" fill="#0f172a">2. Sistema consulta treinamentos ativos</text><line x1="600" y1="200" x2="600" y2="230" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="250" y="230" width="700" height="45" rx="10" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/><text x="600.0" y="258" font-family="Arial" font-size="14" text-anchor="middle" fill="#0f172a">3. Banco retorna lista de treinamentos</text><line x1="600" y1="275" x2="600" y2="305" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="250" y="305" width="700" height="45" rx="10" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/><text x="600.0" y="333" font-family="Arial" font-size="14" text-anchor="middle" fill="#0f172a">4. Colaborador seleciona um treinamento</text><line x1="600" y1="350" x2="600" y2="380" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="250" y="380" width="700" height="45" rx="10" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/><text x="600.0" y="408" font-family="Arial" font-size="14" text-anchor="middle" fill="#0f172a">5. Sistema verifica inscricao existente</text><line x1="600" y1="425" x2="600" y2="455" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="250" y="455" width="700" height="45" rx="10" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/><text x="600.0" y="483" font-family="Arial" font-size="14" text-anchor="middle" fill="#0f172a">6. Sistema verifica disponibilidade</text><line x1="600" y1="500" x2="600" y2="530" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="250" y="530" width="700" height="45" rx="10" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/><text x="600.0" y="558" font-family="Arial" font-size="14" text-anchor="middle" fill="#0f172a">7. Sistema registra a inscricao</text><line x1="600" y1="575" x2="600" y2="605" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="250" y="605" width="700" height="45" rx="10" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/><text x="600.0" y="633" font-family="Arial" font-size="14" text-anchor="middle" fill="#0f172a">8. Banco salva participacao</text><line x1="600" y1="650" x2="600" y2="680" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/><rect x="250" y="680" width="700" height="45" rx="10" fill="#F8FAFC" stroke="#334155" stroke-width="1.5"/><text x="600.0" y="708" font-family="Arial" font-size="14" text-anchor="middle" fill="#0f172a">9. Sistema confirma inscricao</text></svg>